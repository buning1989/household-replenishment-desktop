<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f1ec" />
    <!--
      Content-Security-Policy：限制页面可加载的资源来源，防止 XSS 通过外链脚本注入。
      - dev 模式（Vite HMR）需要 unsafe-eval 和 127.0.0.1 来源；
      - production 模式（file://）通过 self + file: 加载本地资源；
      - object-src 'none' 禁止 <embed>/<object>；
      - connect-src 允许 data: 以支持应用内 data URI 的读写操作。
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' http://127.0.0.1:5173; style-src 'self' 'unsafe-inline' http://127.0.0.1:5173; img-src 'self' data: file:; font-src 'self' data: file:; connect-src 'self' data: file: http://127.0.0.1:5173; object-src 'none';" />
    <title>403家庭管家</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
